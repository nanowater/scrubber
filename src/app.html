<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Scrubber - Browser Privacy Filter</title>
		<meta
			name="description"
			content="Browser-first privacy filtering app that detects sensitive text locally using openai/privacy-filter and Transformers.js."
		/>
		<meta
			name="keywords"
			content="scrubber, privacy filter, pii detection, local inference, svelte, transformers.js, openai privacy-filter"
		/>
		<meta name="author" content="Ryusei" />
		<meta name="robots" content="index, follow" />
		<meta name="theme-color" content="#10b981" />
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Scrubber" />

			property="og:description"
			content="Detect sensitive text entirely in your browser. No input data is sent to a backend server."

		<meta property="og:image" content="/icon.svg" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Scrubber - Browser Privacy Filter" />
		<meta
			name="twitter:description"
			content="Detect sensitive text entirely in your browser with openai/privacy-filter."
		/>
		<meta name="twitter:image" content="/icon.svg" />
		<link rel="canonical" href="https://ryusei.github.io/privacy-filter/" />
